name: Publish SDK and Wiki

on:
  push:
    tags: ['sdk-v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: nuget-production
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version=$(sed -n 's:.*<VersionPrefix>\(.*\)</VersionPrefix>.*:\1:p' Directory.Build.props)-$(sed -n 's:.*<VersionSuffix>\(.*\)</VersionSuffix>.*:\1:p' Directory.Build.props)
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME}" = "sdk-v${version}"
          fi
          echo "SDK_VERSION=$version" >> "$GITHUB_ENV"
      - run: dotnet restore PCL-N-Plugin-SDK.slnx
      - run: dotnet build PCL-N-Plugin-SDK.slnx -c Release --no-restore -warnaserror
      - run: dotnet test PCL-N-Plugin-SDK.slnx -c Release --no-build --no-restore -warnaserror
      - name: Pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts
          for project in src/*/*.csproj; do
            case "$project" in
              *Abstractions*|*Analyzers*|*Sdk.csproj|*Sdk.Build*|*Testing*) dotnet pack "$project" -c Release --no-build -o artifacts ;;
            esac
          done
          test "$(find artifacts -name '*.nupkg' ! -name '*.symbols.nupkg' | wc -l)" -eq 5
      - name: Push NuGet packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push 'artifacts/*.nupkg' --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
      - name: Sync GitHub Wiki
        env:
          WIKI_TOKEN: ${{ secrets.WIKI_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$WIKI_TOKEN"
          git clone "https://x-access-token:${WIKI_TOKEN}@github.com/${GITHUB_REPOSITORY}.wiki.git" wiki-target
          find wiki-target -maxdepth 1 -type f -name '*.md' -delete
          cp wiki/*.md wiki-target/
          cd wiki-target
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git diff --cached --quiet || git commit -m "docs: sync SDK ${SDK_VERSION} wiki"
          git push
      - uses: softprops/action-gh-release@v2
        with:
          name: PCL N Plugin SDK ${{ env.SDK_VERSION }}
          prerelease: true
          files: artifacts/*
