name: SDK CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore PCL-N-Plugin-SDK.slnx
      - run: dotnet build PCL-N-Plugin-SDK.slnx -c Release --no-restore -warnaserror
      - run: dotnet test PCL-N-Plugin-SDK.slnx -c Release --no-build --no-restore -warnaserror
      - run: dotnet pack src/PCL.N.Plugin.Abstractions/PCL.N.Plugin.Abstractions.csproj -c Release --no-build -o artifacts
      - run: dotnet pack src/PCL.N.Plugin.Sdk/PCL.N.Plugin.Sdk.csproj -c Release --no-build -o artifacts
